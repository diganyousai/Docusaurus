backend:
  name: git-gateway
  branch: main

# ✅ 关键：禁用 Email 登录，避免 UI 误导和冲突
disable_email_login: true

site_url: https://genuine-conkies-c8fc4a.netlify.app

media_folder: static/uploads
public_folder: /uploads

collections:
  - name: hap
    label: HAP 文档
    folder: docs/hap
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - label: 标题
        name: title
        widget: string
      - label: 内容
        name: body
        widget: markdown
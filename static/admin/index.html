<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>文档后台</title>
    <meta name="robots" content="noindex" />
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <!-- ✅ 正确加载 Decap CMS（注意 script 标签） -->
    <script src="https://unpkg.com/decap-cms@3/dist/decap-cms.js"></script>

    <!-- ✅ 显式指定 config.yml（GitHub Pages + baseUrl） -->
    <script>
      CMS.init({
        config: {
          load_config_file: true,
          config_file: '/Docusaurus/config.yml'
        }
      });
    </script>
  </body>
</html>

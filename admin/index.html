<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>文档后台</title>
    <meta name="robots" content="noindex" />
    <script>
      // ✅ 彻底关闭自动初始化
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <!-- ✅ 正确加载 Decap CMS -->
    <script src="https://unpkg.com/decap-cms@3/dist/decap-cms.js"></script>

    <!-- ✅ 手动初始化，明确“不要再自动加载 admin/config.yml” -->
    <script>
      CMS.init({
        configFile: '/Docusaurus/config.yml'
      });
    </script>
  </body>
</html>
